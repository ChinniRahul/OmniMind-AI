<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with dark cosmic slate and rounded viewport -->
  <rect width="512" height="512" rx="112" fill="#07090e" />
  
  <!-- Subtle gradient background radial ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#indigoGrad)" stroke-width="3.5" opacity="0.15" />
  <circle cx="256" cy="256" r="128" fill="none" stroke="url(#indigoGrad)" stroke-width="2" stroke-dasharray="8,8" opacity="0.3" />
  
  <defs>
    <radialGradient id="indigoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#07090e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glowing core base -->
  <circle cx="256" cy="256" r="110" fill="url(#glow)" />

  <!-- Multi-modal AI Lattice Nodes & Connections -->
  <g stroke="url(#indigoGrad)" stroke-width="3" opacity="0.85">
    <line x1="256" y1="165" x2="181" y2="218" />
    <line x1="256" y1="165" x2="331" y2="218" />
    <line x1="181" y1="218" x2="208" y2="315" />
    <line x1="331" y1="218" x2="304" y2="315" />
    <line x1="208" y1="315" x2="256" y2="347" />
    <line x1="304" y1="315" x2="256" y2="347" />
    
    <!-- Inner complex cross synapses -->
    <line x1="256" y1="165" x2="256" y2="256" stroke-width="2" opacity="0.5"/>
    <line x1="181" y1="218" x2="331" y2="218" stroke-width="2" opacity="0.5" />
    <line x1="208" y1="315" x2="331" y2="218" stroke-width="1.5" opacity="0.3" />
    <line x1="304" y1="315" x2="181" y2="218" stroke-width="1.5" opacity="0.3" />
    <line x1="256" y1="256" x2="256" y2="347" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Node Dots with brilliant gradients representing processing centers -->
  <!-- Top: Vision/Modal Core -->
  <circle cx="256" cy="165" r="12" fill="#a5b4fc" filter="drop-shadow(0px 0px 6px rgba(165,180,252,0.8))" />
  <!-- Upper Left: Memory / Knowledge -->
  <circle cx="181" cy="218" r="10" fill="#818cf8" />
  <!-- Upper Right: Code Sync -->
  <circle cx="331" cy="218" r="10" fill="#818cf8" />
  <!-- Core synapse center -->
  <circle cx="256" cy="256" r="15" fill="#4f46e5" filter="drop-shadow(0px 0px 8px rgba(79,70,229,0.8))" />
  <!-- Bottom Left: Checklists/Tasks -->
  <circle cx="208" cy="315" r="10" fill="#818cf8" />
  <!-- Bottom Right: File / Context Analyzer -->
  <circle cx="304" cy="315" r="10" fill="#818cf8" />
  <!-- Bottom: Personal Notebook integration -->
  <circle cx="256" cy="347" r="12" fill="#a5b4fc" filter="drop-shadow(0px 0px 6px rgba(165,180,252,0.8))" />
</svg>
