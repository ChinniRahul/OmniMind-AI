<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Solid background covering standard maskable margins -->
  <rect width="192" height="192" fill="#07090e" />
  
  <!-- Subtle gradient background radial ring -->
  <circle cx="96" cy="96" r="56" fill="none" stroke="url(#indigoGrad2)" stroke-width="1.25" opacity="0.15" />
  
  <defs>
    <radialGradient id="indigoGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#07090e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glowing core base -->
  <circle cx="96" cy="96" r="32" fill="url(#glow2)" />

  <!-- Multi-modal AI Lattice Nodes & Connections -->
  <g stroke="url(#indigoGrad2)" stroke-width="1.25" opacity="0.85">
    <line x1="96" y1="68" x2="74" y2="84" />
    <line x1="96" y1="68" x2="118" y2="84" />
    <line x1="74" y1="84" x2="82" y2="112" />
    <line x1="118" y1="84" x2="110" y2="112" />
    <line x1="82" y1="112" x2="96" y2="122" />
    <line x1="110" y1="112" x2="96" y2="122" />
  </g>

  <!-- Node Dots with brilliant gradients -->
  <circle cx="96" cy="68" r="4.2" fill="#a5b4fc" filter="drop-shadow(0px 0px 2px rgba(165,180,252,0.8))" />
  <circle cx="74" cy="84" r="3.2" fill="#818cf8" />
  <circle cx="118" cy="84" r="3.2" fill="#818cf8" />
  <circle cx="96" cy="96" r="5" fill="#4f46e5" filter="drop-shadow(0px 0px 3px rgba(79,70,229,0.8))" />
  <circle cx="82" cy="112" r="3.2" fill="#818cf8" />
  <circle cx="110" cy="112" r="3.2" fill="#818cf8" />
  <circle cx="96" cy="122" r="4.2" fill="#a5b4fc" filter="drop-shadow(0px 0px 2px rgba(165,180,252,0.8))" />
</svg>
